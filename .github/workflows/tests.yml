name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src
      - name: Checkout vbwd-fe-admin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-admin
          path: vbwd-fe-admin
          submodules: recursive
      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-admin/plugins/cms-ai/
      # cms-ai registers an editor extension into cms-admin's registry and its
      # tests import ../../../cms-admin/src/editor/* — cms-admin is gitignored in
      # vbwd-fe-admin, so overlay it from its own repo for the import to resolve.
      - name: Checkout cms-admin peer
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-admin-plugin-cms
          path: cms-admin-src
      - name: Overlay cms-admin peer
        run: |
          mkdir -p vbwd-fe-admin/plugins/cms-admin
          cp -r cms-admin-src/. vbwd-fe-admin/plugins/cms-admin/
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-admin/package-lock.json
      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-admin/vbwd-fe-core
          npm install
          npm run build
      - name: Install dependencies
        run: |
          cd vbwd-fe-admin
          npm install
      - name: Run plugin tests
        run: |
          cd vbwd-fe-admin
          if find plugins/cms-ai -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            npx vitest run plugins/cms-ai --reporter=verbose
          else
            echo "No tests found for cms-ai — skipping."
          fi
